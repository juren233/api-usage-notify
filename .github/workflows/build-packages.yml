name: Build Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: 读取构建配置
    runs-on: ubuntu-latest
    outputs:
      build_enabled: ${{ steps.config.outputs.build_enabled }}
      android_enabled: ${{ steps.config.outputs.android_enabled }}
      release_enabled: ${{ steps.config.outputs.release_enabled }}
      release_type: ${{ steps.config.outputs.release_type }}
      release_tag: ${{ steps.config.outputs.release_tag }}
      release_title: ${{ steps.config.outputs.release_title }}
      release_asset: ${{ steps.config.outputs.release_asset }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read config
        id: config
        shell: pwsh
        run: |
          $config = Get-Content -LiteralPath ".github/build-config.json" -Raw | ConvertFrom-Json
          $buildText = Get-Content -LiteralPath "app/build.gradle.kts" -Raw
          $versionNameMatch = [regex]::Match($buildText, 'versionName\s*=\s*"([^"]+)"')
          $versionCodeMatch = [regex]::Match($buildText, 'versionCode\s*=\s*(\d+)')
          if (-not $versionNameMatch.Success) {
            throw "app/build.gradle.kts 缺少 versionName"
          }
          if (-not $versionCodeMatch.Success) {
            throw "app/build.gradle.kts 缺少 versionCode"
          }
          $versionName = $versionNameMatch.Groups[1].Value
          $versionCode = $versionCodeMatch.Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($versionName)) {
            throw "versionName 为空"
          }
          if ($versionCode -notmatch '^\d+$') {
            throw "versionCode 必须是整数，当前值：$versionCode"
          }
          "build_enabled=$($config.build.enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "android_enabled=$($config.android.enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "release_enabled=$($config.githubRelease.enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "release_type=$($config.githubRelease.type)" >> $env:GITHUB_OUTPUT
          "release_tag=v$versionName" >> $env:GITHUB_OUTPUT
          "release_title=UsageNotify v$versionName" >> $env:GITHUB_OUTPUT
          "release_asset=usage-notify-v$versionName-android-release.apk" >> $env:GITHUB_OUTPUT

  android-signed:
    name: Android signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: prepare
    if: needs.prepare.outputs.build_enabled == 'true' && needs.prepare.outputs.android_enabled == 'true'
    env:
      RELEASE_ENABLED: ${{ needs.prepare.outputs.release_enabled }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Android signing material
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/signing
          keystore_path="app/signing/usagenotify.jks"
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            if [[ "${RELEASE_ENABLED:-false}" == "true" ]]; then
              echo "已开启 GitHub Release，但缺少 Android 签名 Secrets" >&2
              exit 1
            fi
            store_password="android"
            key_alias="androiddebugkey"
            key_password="android"
            keytool -genkeypair -v \
              -keystore "$keystore_path" \
              -storepass "$store_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -dname "CN=UsageNotify CI, OU=CI, O=OpenAI, L=Earth, S=Earth, C=US"
          else
            if [[ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ]]; then
              echo "缺少 GitHub Secret：ANDROID_KEYSTORE_PASSWORD" >&2
              exit 1
            fi
            if [[ -z "${ANDROID_KEY_ALIAS:-}" ]]; then
              echo "缺少 GitHub Secret：ANDROID_KEY_ALIAS" >&2
              exit 1
            fi
            if [[ -z "${ANDROID_KEY_PASSWORD:-}" ]]; then
              echo "缺少 GitHub Secret：ANDROID_KEY_PASSWORD" >&2
              exit 1
            fi
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
            store_password="$ANDROID_KEYSTORE_PASSWORD"
            key_alias="$ANDROID_KEY_ALIAS"
            key_password="$ANDROID_KEY_PASSWORD"
          fi
          cat > app/signing/signing.properties <<EOF
          storeFile=signing/usagenotify.jks
          storePassword=$store_password
          keyAlias=$key_alias
          keyPassword=$key_password
          EOF

      - name: Build Android package
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew assembleRelease
          mkdir -p script
          cp app/build/outputs/apk/release/app-release.apk script/UsageNotify-release.apk

      - name: Verify signed Android APK
        shell: bash
        run: |
          set -euo pipefail
          apk="script/UsageNotify-release.apk"
          apksigner="$(find "${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$apksigner" verify --verbose --print-certs "$apk"
          sha256sum "$apk"
          stat --printf='产物：%n\n大小：%s bytes\n' "$apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-package
          path: script/UsageNotify-release.apk
          if-no-files-found: error
          compression-level: 0
          overwrite: true

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare
      - android-signed
    if: >
      always() &&
      github.event_name != 'pull_request' &&
      needs.prepare.outputs.release_enabled == 'true' &&
      needs.android-signed.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-package
          path: release-input/android

      - name: Prepare release assets and notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_tag }}"
          mkdir -p release-assets
          apk="$(find release-input/android -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${apk:-}" ]]; then
            echo "没有找到 Android 产物。" >&2
            exit 1
          fi
          cp "$apk" "release-assets/${{ needs.prepare.outputs.release_asset }}"
          {
            echo "## 更新内容"
            git log -1 --pretty=format:%B
            echo
            echo
            echo "## 版本下载"
            echo "- Android release APK：[${{ needs.prepare.outputs.release_asset }}](https://github.com/${{ github.repository }}/releases/download/$tag/${{ needs.prepare.outputs.release_asset }})"
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          create_args=()
          edit_args=(--prerelease=false)
          if [[ "${{ needs.prepare.outputs.release_type }}" == "prerelease" ]]; then
            create_args+=(--prerelease)
            edit_args=(--prerelease)
          fi
          if gh release view "${{ needs.prepare.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ needs.prepare.outputs.release_tag }}" release-assets/* --clobber
            gh release edit "${{ needs.prepare.outputs.release_tag }}" \
              --title "${{ needs.prepare.outputs.release_title }}" \
              --notes-file release-notes.md \
              "${edit_args[@]}"
          else
            gh release create "${{ needs.prepare.outputs.release_tag }}" release-assets/* \
              --title "${{ needs.prepare.outputs.release_title }}" \
              --notes-file release-notes.md \
              "${create_args[@]}"
          fi
